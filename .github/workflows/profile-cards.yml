name: Update profile cards

on:
  schedule:
    - cron: "0 3 * * *"   # atualiza todo dia às 03:00 UTC
  workflow_dispatch:        # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar card de estatísticas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&count_private=true&hide_border=true&title_color=7308EF&icon_color=7308EF&text_color=c9d1d9&bg_color=0d1117"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&hide_border=true&title_color=7308EF&text_color=7308EF&bg_color=0d1117"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar troféus
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # etapa experimental (feature branch); não deve travar o job se falhar

      - name: Commitar cards atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: atualiza cards do perfil [skip ci]"
          git push
